name: BRNO SCENA - tydenni grab akci

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  grab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python grab_povrch.py
      - run: python grab_underground.py
      - name: Commit
        run: |
          git config user.name "brno-scena-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain public/index.html)" ]; then
            git add public/index.html
            git commit -m "auto: tydenni doplneni akci"
            git pull --rebase --autostash origin main
            git push
          else
            echo "Zadna zmena."
          fi
      - name: Email report
        if: ${{ hashFiles('report.txt') != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "BRNO SCENA - nove akce doplneny"
          to: gpuagency@gmail.com
          from: BRNO SCENA bot <${{ secrets.GMAIL_USER }}>
          body: file://report.txt
