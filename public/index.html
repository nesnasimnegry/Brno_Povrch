 return `<section class="blk"><div class="wrap"><div class="kick">◤ ${t("admin_t")}</div><h2 class="big" style="font-size:44px;margin-bottom:24px">${t("admin_pending")}</h2>
 <div id="pendingList">${pending.length?pending.map(p=>`<div class="admin-row" data-id="${p.id}"><div class="info"><b>${esc(p.title)}</b> <span class="mut">[${(p.mode||"?").toUpperCase()}]</span> — ${esc(p.date)} ${esc(p.time)} · ${esc((V[p.venue]||{}).name||p.venue)} · ${p.genres.join(",")}</div>
 <div class="acts"><button class="mini good" data-act="approve" data-id="${p.id}">${t("approve")}</button><button class="mini bad" data-act="reject" data-id="${p.id}">${t("reject")}</button></div></div>`).join(""):`<div class="notice">${t("admin_none")}</div>`}</div>

function renderFooter(){document.getElementById("footer").innerHTML=`<div class="foot"><div><h4>${t("news_h")}</h4><p>${t("news_p")}</p>
 <form class="news" id="newsForm"><input name="contact" placeholder="${t("news_ph")}"><button class="btn btn-pri" type="submit">${t("join")}</button></form>
 <div id="newsMsg" class="mono pri" style="font-size:12px;margin-top:10px"></div></div>
 <div class="col"><div class="h">${t("f_nav")}</div><a href="#/akce">${t("nav_akce")}</a><a href="#/kluby">${t("nav_kluby")}</a><a href="#/pridat">${t("submit_show")}</a></div>
 <div class="col"><div class="h">/ ${MODE.toUpperCase()}</div><span>Telegram</span><span>Instagram</span><span>Radio</span><a href="#/admin">${t("admin")}</a></div></div>
 <div class="foot-strip"></div><div class="copy"><div>${t("copy1")}</div><div>${t("copy2")}</div></div>`;}
function renderChrome(){const route=(location.hash||"#/").split("/")[1]||"";
 const _fc=followedEvents().length;
 const items=[["akce",t("nav_akce")],["kluby",t("nav_kluby")],["sleduju","★ "+(LANG==="cs"?"SLEDUJU":"FOLLOWING")+(_fc?` ${_fc}`:"")],["mapa",LANG==="cs"?"MAPA":"MAP"],["hledat",LANG==="cs"?"HLEDAT":"SEARCH"],["pridat",t("nav_pridat")]];
 document.getElementById("nav").innerHTML=items.map(([r,label])=>`<a href="#/${r}" class="${route===r?"active":""}">${label}</a>`).join("");
 document.getElementById("lang").innerHTML=["cs","en"].map(l=>`<button class="${LANG===l?"on":""}" data-l="${l}">${l.toUpperCase()}</button>`).join("");
 document.getElementById("modeBtn").textContent=MODE==="underground"?"⇄ POVRCH":"⇄ UNDERGROUND";}
function router(noScroll){const parts=(location.hash||"#/").replace(/^#\//,"").split("/");const route=parts[0]||"";let html;
 if(route===""||route==="home")html=viewHome();
 else if(route==="akce"&&parts[1])html=viewDetail(parts[1]);
 else if(route==="akce")html=viewAkce();
 else if(route==="klub"&&parts[1])html=viewVenue(parts[1]);
 else if(route==="kluby")html=viewKluby();
 else if(route==="sleduju")html=viewSleduju();
 else if(route==="hledat")html=viewSearch();
 else if(route==="mapa")html=viewMapa();
 else if(route==="pridat")html=viewPridat();
 else if(route==="admin")html=viewAdmin();
 else html=`<section class="blk"><div class="wrap"><div class="kick">◤ 404</div><h2 class="big">${LANG==="cs"?"Ztracen ve scéně.":"Lost in the scene."}</h2><div style="margin-top:22px;display:flex;gap:12px;flex-wrap:wrap"><a class="btn btn-pri" href="#/">${LANG==="cs"?"DOMŮ":"HOME"}</a><a class="btn btn-out" href="#/akce">${t("nav_akce")}</a></div></div></section>`;
 document.getElementById("app").innerHTML=html;renderChrome();renderFooter();bindView(route);
 document.getElementById("nav").classList.remove("open");if(!noScroll)window.scrollTo(0,0);}
function bindView(route){
 if(route==="hledat"){const si=document.getElementById("searchInput");if(si){si.addEventListener("input",e=>{SEARCH=e.target.value;document.getElementById("searchResults").innerHTML=renderSearch();});si.focus();}}
 if(route==="mapa"&&window.L){const m=L.map("leafmap",{scrollWheelZoom:true,zoomControl:true}).setView([49.197,16.607],13);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{maxZoom:19,subdomains:"abcd",attribution:"© OpenStreetMap, © CARTO"}).addTo(m);
  const marks={};const focus=(location.hash||"").split("/")[2];
  VENUES.filter(v=>v.mode===MODE).forEach(v=>{const c=COORDS[v.id];if(!c)return;const col=v.mode==="underground"?"#ecc400":"#37d4e6";marks[v.id]=L.circleMarker(c,{radius:8,color:col,weight:2,fillColor:col,fillOpacity:.55}).addTo(m).bindTooltip(esc(v.name),{permanent:true,direction:"top",offset:[0,-4],className:"vlabel"}).bindPopup(`<b>${esc(v.name)}</b><br>${esc(v.district)}<br><a href="#/klub/${v.id}">${LANG==="cs"?"detail klubu →":"venue detail →"}</a>`);});
  if(focus&&marks[focus]){m.setView(COORDS[focus],16);marks[focus].openPopup();}
  const upd=()=>m.getContainer().classList.toggle("zoomed",m.getZoom()>=15);m.on("zoom",upd);upd();
  const ph=m.getContainer().querySelector(".map-loading");if(ph)ph.remove();
  setTimeout(()=>m.invalidateSize(),120);}
 if(route==="akce"&&!location.hash.split("/")[2]){
  document.getElementById("genrePills")?.addEventListener("click",e=>{const b=e.target.closest("[data-g]");if(!b)return;FILT.genre=b.dataset.g;
   document.querySelectorAll("#genrePills .pill").forEach(p=>p.classList.toggle("on",p.dataset.g===FILT.genre));document.getElementById("akceList").innerHTML=renderAkceList();});
  document.getElementById("fWhen")?.addEventListener("change",e=>{FILT.when=e.target.value;document.getElementById("akceList").innerHTML=renderAkceList();});
  document.getElementById("fVenue")?.addEventListener("change",e=>{FILT.venue=e.target.value;document.getElementById("akceList").innerHTML=renderAkceList();});}
 document.getElementById("shareBtn")?.addEventListener("click",()=>{const url=location.href;if(navigator.share){navigator.share({url}).catch(()=>{});}else{navigator.clipboard&&navigator.clipboard.writeText(url);alert(t("shared"));}});
 document.getElementById("addForm")?.addEventListener("submit",e=>{e.preventDefault();const f=new FormData(e.target);
  const ev={id:"x"+Date.now(),mode:MODE,title:f.get("title"),date:f.get("date"),time:f.get("time")||"20:00",venue:f.get("venue"),genres:[f.get("genre")],price:f.get("price")||"?",ticket:f.get("ticket")||"",featured:false,lineup:(f.get("lineup")||"").split(",").map(s=>s.trim()).filter(Boolean),blurb:(f.get("desc")||"").slice(0,90),desc:f.get("desc")||""};
  const p=getPending();p.push(ev);save("bu_pending",p);fetch("https://api.web3forms.com/submit",{method:"POST",headers:{"Content-Type":"application/json",Accept:"application/json"},body:JSON.stringify({access_key:W3F_KEY,subject:"Nová akce: "+(f.get("title")||"?"),from_name:"BRNO SCÉNA",mode:MODE,title:f.get("title")||"",date:f.get("date")||"",time:f.get("time")||"",venue:f.get("venue")||"",genre:f.get("genre")||"",price:f.get("price")||"",ticket:f.get("ticket")||"",lineup:f.get("lineup")||"",desc:f.get("desc")||""})}).catch(()=>{});e.target.reset();document.getElementById("addMsg").innerHTML=`<div class="notice ok">${t("add_ok")}</div>`;});
 document.getElementById("newsForm")?.addEventListener("submit",e=>{e.preventDefault();const c=new FormData(e.target).get("contact");if(!c)return;const s=load("bu_subs",[]);s.push(c);save("bu_subs",s);fetch("https://api.web3forms.com/submit",{method:"POST",headers:{"Content-Type":"application/json",Accept:"application/json"},body:JSON.stringify({access_key:W3F_KEY,subject:"Nový odběratel newsletteru",from_name:"BRNO SCÉNA",contact:c})}).catch(()=>{});e.target.reset();document.getElementById("newsMsg").textContent=t("news_ok");});
 document.getElementById("subForm")?.addEventListener("submit",e=>{e.preventDefault();const f=new FormData(e.target);const email=(f.get("email")||"").trim();if(!email||!f.get("consent"))return;const msg=document.getElementById("subMsg");msg.textContent=LANG==="cs"?"posílám…":"sending…";fetch("/subscribe",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,follows:FOLLOWS,consent:true})}).then(r=>r.json()).then(d=>{if(d.success){save("bu_sub_email",email);msg.innerHTML=`<span style="color:#7CFC9B">✓ ${LANG==="cs"?(d.updated?"Aktualizováno — budeš dostávat upozornění.":"Hotovo! Budeš dostávat upozornění na akce, co sleduješ."):(d.updated?"Updated.":"Done — you'll get alerts for your follows.")}</span>`;}else{msg.innerHTML=`<span style="color:#ff9b9b">${esc(d.error||(LANG==="cs"?"něco se nepovedlo":"something went wrong"))}</span>`;}}).catch(()=>{msg.innerHTML=`<span style="color:#ff9b9b">${LANG==="cs"?"chyba sítě — zkus to znovu":"network error — try again"}</span>`;});});
 document.getElementById("gateForm")?.addEventListener("submit",e=>{e.preventDefault();const pw=new FormData(e.target).get("pw");if(pw==="podzemi"){sessionStorage.setItem("bu_admin","1");router();}else document.getElementById("gateMsg").textContent=t("admin_wrong");});
 document.getElementById("pendingList")?.addEventListener("click",e=>{const b=e.target.closest("[data-act]");if(!b)return;const id=b.dataset.id;let p=getPending();const item=p.find(x=>x.id===id);p=p.filter(x=>x.id!==id);save("bu_pending",p);if(b.dataset.act==="approve"&&item){const a=load("bu_approved",[]);a.push(item);save("bu_approved",a);}router();});
}

document.body.className="mode-"+MODE;
document.getElementById("modeBtn").addEventListener("click",()=>setMode(MODE==="underground"?"public":"underground"));

router();
